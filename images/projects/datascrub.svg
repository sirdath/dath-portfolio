<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="dsBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a14"/>
      <stop offset="100%" stop-color="#11111e"/>
    </linearGradient>
    <linearGradient id="dsAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="dsGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="dsCleanCell" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#a5b4fc" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#a5b4fc" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="500" fill="url(#dsBg)"/>

  <!-- Center glow -->
  <ellipse cx="400" cy="250" rx="320" ry="220" fill="url(#dsGlow)"/>

  <!-- Data table grid: 9 columns x 6 rows -->
  <g opacity="0.95">
    <!-- Row 1: dirty (more dim cells) -->
    <rect x="120" y="100" width="60" height="32" rx="3" fill="#1f1f2e" stroke="#33334a" stroke-width="1"/>
    <rect x="190" y="100" width="60" height="32" rx="3" fill="#1f1f2e" stroke="#33334a" stroke-width="1"/>
    <rect x="260" y="100" width="60" height="32" rx="3" fill="#1f1f2e" stroke="#33334a" stroke-width="1"/>
    <rect x="330" y="100" width="60" height="32" rx="3" fill="#3d2f1f" stroke="#7a5e3a" stroke-width="1"/>
    <rect x="400" y="100" width="60" height="32" rx="3" fill="#1f1f2e" stroke="#33334a" stroke-width="1"/>
    <rect x="470" y="100" width="60" height="32" rx="3" fill="#3d2f1f" stroke="#7a5e3a" stroke-width="1"/>
    <rect x="540" y="100" width="60" height="32" rx="3" fill="#1f1f2e" stroke="#33334a" stroke-width="1"/>
    <rect x="610" y="100" width="60" height="32" rx="3" fill="#1f1f2e" stroke="#33334a" stroke-width="1"/>
    <rect x="680" y="100" width="60" height="32" rx="3" fill="#1f1f2e" stroke="#33334a" stroke-width="1"/>

    <!-- Row 2: cleaned (brighter, accent border) -->
    <rect x="120" y="142" width="60" height="32" rx="3" fill="#1a1a2e" stroke="#818cf8" stroke-width="1.2"/>
    <rect x="190" y="142" width="60" height="32" rx="3" fill="#1a1a2e" stroke="#818cf8" stroke-width="1.2"/>
    <rect x="260" y="142" width="60" height="32" rx="3" fill="#1a1a2e" stroke="#818cf8" stroke-width="1.2"/>
    <rect x="330" y="142" width="60" height="32" rx="3" fill="#1a1a2e" stroke="#818cf8" stroke-width="1.2"/>
    <rect x="400" y="142" width="60" height="32" rx="3" fill="#1a1a2e" stroke="#818cf8" stroke-width="1.2"/>
    <rect x="470" y="142" width="60" height="32" rx="3" fill="#1a1a2e" stroke="#818cf8" stroke-width="1.2"/>
    <rect x="540" y="142" width="60" height="32" rx="3" fill="#1a1a2e" stroke="#818cf8" stroke-width="1.2"/>
    <rect x="610" y="142" width="60" height="32" rx="3" fill="#1a1a2e" stroke="#818cf8" stroke-width="1.2"/>
    <rect x="680" y="142" width="60" height="32" rx="3" fill="#1a1a2e" stroke="#818cf8" stroke-width="1.2"/>

    <!-- Row 3 (mid): the "scrubber bar" - bright accent line -->
    <rect x="80" y="184" width="680" height="32" rx="4" fill="url(#dsAccent)" opacity="0.9"/>
    <text x="420" y="206" font-family="ui-monospace, monospace" font-size="12" letter-spacing="6" fill="#0a0a14" text-anchor="middle" font-weight="700">CLEANING...</text>

    <!-- Row 4: cleaned (full glow, white-ish) -->
    <rect x="120" y="226" width="60" height="32" rx="3" fill="#2d2d4a" stroke="#a5b4fc" stroke-width="1.5"/>
    <rect x="190" y="226" width="60" height="32" rx="3" fill="#2d2d4a" stroke="#a5b4fc" stroke-width="1.5"/>
    <rect x="260" y="226" width="60" height="32" rx="3" fill="#2d2d4a" stroke="#a5b4fc" stroke-width="1.5"/>
    <rect x="330" y="226" width="60" height="32" rx="3" fill="#2d2d4a" stroke="#a5b4fc" stroke-width="1.5"/>
    <rect x="400" y="226" width="60" height="32" rx="3" fill="#2d2d4a" stroke="#a5b4fc" stroke-width="1.5"/>
    <rect x="470" y="226" width="60" height="32" rx="3" fill="#2d2d4a" stroke="#a5b4fc" stroke-width="1.5"/>
    <rect x="540" y="226" width="60" height="32" rx="3" fill="#2d2d4a" stroke="#a5b4fc" stroke-width="1.5"/>
    <rect x="610" y="226" width="60" height="32" rx="3" fill="#2d2d4a" stroke="#a5b4fc" stroke-width="1.5"/>
    <rect x="680" y="226" width="60" height="32" rx="3" fill="#2d2d4a" stroke="#a5b4fc" stroke-width="1.5"/>

    <!-- Row 5: cleaned -->
    <rect x="120" y="268" width="60" height="32" rx="3" fill="#2d2d4a" stroke="#a5b4fc" stroke-width="1.5"/>
    <rect x="190" y="268" width="60" height="32" rx="3" fill="#2d2d4a" stroke="#a5b4fc" stroke-width="1.5"/>
    <rect x="260" y="268" width="60" height="32" rx="3" fill="#2d2d4a" stroke="#a5b4fc" stroke-width="1.5"/>
    <rect x="330" y="268" width="60" height="32" rx="3" fill="#2d2d4a" stroke="#a5b4fc" stroke-width="1.5"/>
    <rect x="400" y="268" width="60" height="32" rx="3" fill="#2d2d4a" stroke="#a5b4fc" stroke-width="1.5"/>
    <rect x="470" y="268" width="60" height="32" rx="3" fill="#2d2d4a" stroke="#a5b4fc" stroke-width="1.5"/>
    <rect x="540" y="268" width="60" height="32" rx="3" fill="#2d2d4a" stroke="#a5b4fc" stroke-width="1.5"/>
    <rect x="610" y="268" width="60" height="32" rx="3" fill="#2d2d4a" stroke="#a5b4fc" stroke-width="1.5"/>
    <rect x="680" y="268" width="60" height="32" rx="3" fill="#2d2d4a" stroke="#a5b4fc" stroke-width="1.5"/>

    <!-- Row 6: cleaned (brightest) -->
    <rect x="120" y="310" width="60" height="32" rx="3" fill="#3a3a5e" stroke="#c7d2fe" stroke-width="1.5"/>
    <rect x="190" y="310" width="60" height="32" rx="3" fill="#3a3a5e" stroke="#c7d2fe" stroke-width="1.5"/>
    <rect x="260" y="310" width="60" height="32" rx="3" fill="#3a3a5e" stroke="#c7d2fe" stroke-width="1.5"/>
    <rect x="330" y="310" width="60" height="32" rx="3" fill="#3a3a5e" stroke="#c7d2fe" stroke-width="1.5"/>
    <rect x="400" y="310" width="60" height="32" rx="3" fill="#3a3a5e" stroke="#c7d2fe" stroke-width="1.5"/>
    <rect x="470" y="310" width="60" height="32" rx="3" fill="#3a3a5e" stroke="#c7d2fe" stroke-width="1.5"/>
    <rect x="540" y="310" width="60" height="32" rx="3" fill="#3a3a5e" stroke="#c7d2fe" stroke-width="1.5"/>
    <rect x="610" y="310" width="60" height="32" rx="3" fill="#3a3a5e" stroke="#c7d2fe" stroke-width="1.5"/>
    <rect x="680" y="310" width="60" height="32" rx="3" fill="#3a3a5e" stroke="#c7d2fe" stroke-width="1.5"/>
  </g>

  <!-- Sparkles around the scrubber -->
  <g fill="#a5b4fc" opacity="0.85">
    <circle cx="70" cy="190" r="2"/>
    <circle cx="100" cy="200" r="1.5"/>
    <circle cx="700" cy="200" r="2"/>
    <circle cx="730" cy="190" r="1.5"/>
    <circle cx="60" cy="210" r="1.5"/>
    <circle cx="745" cy="208" r="1.5"/>
    <!-- Diamond sparkles -->
    <polygon points="50,200 53,196 56,200 53,204"/>
    <polygon points="750,200 753,196 756,200 753,204"/>
  </g>

  <!-- Top label -->
  <text x="400" y="60" font-family="ui-monospace, monospace" font-size="11" letter-spacing="6" fill="#a5b4fc" text-anchor="middle" opacity="0.7">
    DATA SCRUB
  </text>

  <!-- Bottom label -->
  <text x="400" y="430" font-family="ui-monospace, monospace" font-size="10" letter-spacing="5" fill="#a5b4fc" text-anchor="middle" opacity="0.55">
    AI · LOCAL · CLIENT-SIDE · PRIVACY-FIRST
  </text>
</svg>
