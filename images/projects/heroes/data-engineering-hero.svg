<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#0a0f1a"/>
      <stop offset="100%" stop-color="#09090b"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="flow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00f0ff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="flowV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0"/>
      <stop offset="50%" stop-color="#a855f7" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <ellipse cx="800" cy="450" rx="600" ry="400" fill="url(#glow)"/>
  <!-- Pipeline flow lines -->
  <g opacity="0.1">
    <!-- Horizontal flows -->
    <rect x="200" y="250" width="500" height="1" fill="url(#flow)"/>
    <rect x="900" y="250" width="500" height="1" fill="url(#flow)"/>
    <rect x="200" y="450" width="500" height="1" fill="url(#flow)"/>
    <rect x="900" y="450" width="500" height="1" fill="url(#flow)"/>
    <rect x="200" y="650" width="500" height="1" fill="url(#flow)"/>
    <rect x="900" y="650" width="500" height="1" fill="url(#flow)"/>
    <!-- Vertical flows -->
    <rect x="400" y="200" width="1" height="300" fill="url(#flowV)"/>
    <rect x="800" y="200" width="1" height="300" fill="url(#flowV)"/>
    <rect x="1200" y="200" width="1" height="300" fill="url(#flowV)"/>
    <rect x="600" y="400" width="1" height="300" fill="url(#flowV)"/>
    <rect x="1000" y="400" width="1" height="300" fill="url(#flowV)"/>
  </g>
  <!-- Pipeline stage boxes -->
  <g opacity="0.08">
    <rect x="350" y="220" width="100" height="60" rx="8" stroke="#00f0ff" stroke-width="1" fill="none"/>
    <rect x="750" y="220" width="100" height="60" rx="8" stroke="#00f0ff" stroke-width="1" fill="none"/>
    <rect x="1150" y="220" width="100" height="60" rx="8" stroke="#00f0ff" stroke-width="1" fill="none"/>
    <rect x="550" y="420" width="100" height="60" rx="8" stroke="#a855f7" stroke-width="1" fill="none"/>
    <rect x="950" y="420" width="100" height="60" rx="8" stroke="#a855f7" stroke-width="1" fill="none"/>
  </g>
  <!-- Data particles -->
  <g opacity="0.2">
    <circle cx="420" cy="250" r="2" fill="#00f0ff"/>
    <circle cx="480" cy="250" r="1.5" fill="#00f0ff"/>
    <circle cx="550" cy="250" r="1" fill="#00f0ff"/>
    <circle cx="620" cy="250" r="1.5" fill="#00f0ff"/>
    <circle cx="820" cy="250" r="2" fill="#a855f7"/>
    <circle cx="880" cy="250" r="1.5" fill="#a855f7"/>
    <circle cx="950" cy="250" r="1" fill="#a855f7"/>
    <circle cx="610" cy="450" r="2" fill="#a855f7"/>
    <circle cx="680" cy="450" r="1.5" fill="#00f0ff"/>
    <circle cx="750" cy="450" r="1" fill="#00f0ff"/>
    <circle cx="1010" cy="450" r="2" fill="#a855f7"/>
    <circle cx="1080" cy="450" r="1.5" fill="#00f0ff"/>
  </g>
  <!-- Star schema hint -->
  <g opacity="0.06" transform="translate(800,650)">
    <circle cx="0" cy="0" r="6" fill="#22d3ee"/>
    <line x1="0" y1="0" x2="-80" y2="-40" stroke="#22d3ee" stroke-width="0.8"/>
    <line x1="0" y1="0" x2="80" y2="-40" stroke="#22d3ee" stroke-width="0.8"/>
    <line x1="0" y1="0" x2="-60" y2="50" stroke="#22d3ee" stroke-width="0.8"/>
    <line x1="0" y1="0" x2="60" y2="50" stroke="#22d3ee" stroke-width="0.8"/>
    <circle cx="-80" cy="-40" r="4" fill="#22d3ee"/>
    <circle cx="80" cy="-40" r="4" fill="#22d3ee"/>
    <circle cx="-60" cy="50" r="4" fill="#22d3ee"/>
    <circle cx="60" cy="50" r="4" fill="#22d3ee"/>
  </g>
</svg>
