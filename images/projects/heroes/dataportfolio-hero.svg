<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#0c0c1a"/>
      <stop offset="100%" stop-color="#09090b"/>
    </radialGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <ellipse cx="700" cy="350" rx="500" ry="350" fill="url(#glow1)"/>
  <ellipse cx="1000" cy="500" rx="400" ry="300" fill="url(#glow2)"/>
  <!-- Browser window outline -->
  <g opacity="0.08" transform="translate(400,150)">
    <rect width="800" height="500" rx="12" stroke="#00f0ff" stroke-width="1" fill="none"/>
    <!-- Title bar -->
    <rect width="800" height="40" rx="12" stroke="none" fill="#00f0ff" opacity="0.03"/>
    <line x1="0" y1="40" x2="800" y2="40" stroke="#00f0ff" stroke-width="0.5" opacity="0.3"/>
    <!-- Traffic lights -->
    <circle cx="24" cy="20" r="5" fill="#ec4899" opacity="0.4"/>
    <circle cx="44" cy="20" r="5" fill="#eab308" opacity="0.3"/>
    <circle cx="64" cy="20" r="5" fill="#22c55e" opacity="0.3"/>
    <!-- Content lines -->
    <rect x="40" y="70" width="200" height="8" rx="4" fill="#00f0ff" opacity="0.15"/>
    <rect x="40" y="100" width="720" height="4" rx="2" fill="#a1a1aa" opacity="0.08"/>
    <rect x="40" y="115" width="600" height="4" rx="2" fill="#a1a1aa" opacity="0.06"/>
    <rect x="40" y="130" width="680" height="4" rx="2" fill="#a1a1aa" opacity="0.05"/>
    <!-- Cards grid -->
    <rect x="40" y="170" width="230" height="140" rx="8" stroke="#a855f7" stroke-width="0.5" fill="#a855f7" fill-opacity="0.02"/>
    <rect x="290" y="170" width="230" height="140" rx="8" stroke="#a855f7" stroke-width="0.5" fill="#a855f7" fill-opacity="0.02"/>
    <rect x="540" y="170" width="230" height="140" rx="8" stroke="#a855f7" stroke-width="0.5" fill="#a855f7" fill-opacity="0.02"/>
    <rect x="40" y="330" width="230" height="140" rx="8" stroke="#00f0ff" stroke-width="0.5" fill="#00f0ff" fill-opacity="0.02"/>
    <rect x="290" y="330" width="230" height="140" rx="8" stroke="#00f0ff" stroke-width="0.5" fill="#00f0ff" fill-opacity="0.02"/>
    <rect x="540" y="330" width="230" height="140" rx="8" stroke="#00f0ff" stroke-width="0.5" fill="#00f0ff" fill-opacity="0.02"/>
  </g>
  <!-- Floating code brackets -->
  <text x="250" y="380" font-family="monospace" font-size="80" fill="#a855f7" opacity="0.04">{</text>
  <text x="1280" y="380" font-family="monospace" font-size="80" fill="#00f0ff" opacity="0.04">}</text>
</svg>
