<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <radialGradient id="bg1" cx="30%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#09090b"/>
    </radialGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="line1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00f0ff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg1)"/>
  <!-- Ambient glows -->
  <ellipse cx="400" cy="350" rx="500" ry="400" fill="url(#glow1)"/>
  <ellipse cx="1100" cy="500" rx="400" ry="350" fill="url(#glow2)"/>
  <!-- Grid lines (maritime chart feel) -->
  <g opacity="0.06" stroke="#00f0ff" stroke-width="0.5">
    <line x1="0" y1="150" x2="1600" y2="150"/>
    <line x1="0" y1="300" x2="1600" y2="300"/>
    <line x1="0" y1="450" x2="1600" y2="450"/>
    <line x1="0" y1="600" x2="1600" y2="600"/>
    <line x1="0" y1="750" x2="1600" y2="750"/>
    <line x1="200" y1="0" x2="200" y2="900"/>
    <line x1="400" y1="0" x2="400" y2="900"/>
    <line x1="600" y1="0" x2="600" y2="900"/>
    <line x1="800" y1="0" x2="800" y2="900"/>
    <line x1="1000" y1="0" x2="1000" y2="900"/>
    <line x1="1200" y1="0" x2="1200" y2="900"/>
    <line x1="1400" y1="0" x2="1400" y2="900"/>
  </g>
  <!-- Route curves -->
  <path d="M200,400 Q400,350 600,380 Q800,410 1000,350 Q1200,290 1400,320" fill="none" stroke="#00f0ff" stroke-width="1.5" opacity="0.15"/>
  <path d="M100,500 Q350,450 550,470 Q750,490 950,430 Q1150,370 1350,400" fill="none" stroke="#a855f7" stroke-width="1" opacity="0.1"/>
  <!-- Port nodes -->
  <g opacity="0.3">
    <circle cx="200" cy="400" r="4" fill="#00f0ff"/>
    <circle cx="600" cy="380" r="5" fill="#00f0ff"/>
    <circle cx="1000" cy="350" r="4" fill="#00f0ff"/>
    <circle cx="1400" cy="320" r="3" fill="#00f0ff"/>
    <circle cx="400" cy="360" r="2" fill="#a855f7"/>
    <circle cx="800" cy="400" r="3" fill="#a855f7"/>
    <circle cx="1200" cy="300" r="2" fill="#a855f7"/>
  </g>
  <!-- Pulsing risk zones -->
  <circle cx="750" cy="390" r="60" fill="none" stroke="#ec4899" stroke-width="0.5" opacity="0.1"/>
  <circle cx="750" cy="390" r="40" fill="#ec4899" opacity="0.03"/>
  <circle cx="1100" cy="340" r="45" fill="none" stroke="#ec4899" stroke-width="0.5" opacity="0.08"/>
  <!-- Data flow line -->
  <rect x="0" y="448" width="1600" height="1" fill="url(#line1)"/>
</svg>
