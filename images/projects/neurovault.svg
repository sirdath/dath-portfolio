<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="nvBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#09090b"/>
      <stop offset="100%" stop-color="#0f0a1a"/>
    </linearGradient>
    <radialGradient id="nvGlowCenter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nvNodeActive" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="50%" stop-color="#00f0ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nvNodePurple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#a855f7" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="500" fill="url(#nvBg)"/>

  <!-- Center glow -->
  <ellipse cx="400" cy="250" rx="280" ry="200" fill="url(#nvGlowCenter)"/>

  <!-- Edge connections (knowledge graph links) -->
  <g stroke-linecap="round" fill="none">
    <!-- Hub-and-spoke central node -->
    <line x1="400" y1="250" x2="240" y2="160" stroke="#00f0ff" stroke-width="1" opacity="0.5"/>
    <line x1="400" y1="250" x2="560" y2="170" stroke="#00f0ff" stroke-width="1" opacity="0.5"/>
    <line x1="400" y1="250" x2="200" y2="320" stroke="#a855f7" stroke-width="1" opacity="0.45"/>
    <line x1="400" y1="250" x2="600" y2="330" stroke="#a855f7" stroke-width="1" opacity="0.45"/>
    <line x1="400" y1="250" x2="320" y2="100" stroke="#22d3ee" stroke-width="1" opacity="0.4"/>
    <line x1="400" y1="250" x2="480" y2="100" stroke="#22d3ee" stroke-width="1" opacity="0.4"/>
    <line x1="400" y1="250" x2="350" y2="400" stroke="#ec4899" stroke-width="1" opacity="0.4"/>
    <line x1="400" y1="250" x2="450" y2="400" stroke="#ec4899" stroke-width="1" opacity="0.4"/>

    <!-- Secondary connections (peer-to-peer) -->
    <line x1="240" y1="160" x2="320" y2="100" stroke="#ffffff" stroke-width="0.5" opacity="0.2"/>
    <line x1="320" y1="100" x2="480" y2="100" stroke="#ffffff" stroke-width="0.5" opacity="0.18"/>
    <line x1="480" y1="100" x2="560" y2="170" stroke="#ffffff" stroke-width="0.5" opacity="0.2"/>
    <line x1="560" y1="170" x2="600" y2="330" stroke="#ffffff" stroke-width="0.5" opacity="0.18"/>
    <line x1="600" y1="330" x2="450" y2="400" stroke="#ffffff" stroke-width="0.5" opacity="0.18"/>
    <line x1="450" y1="400" x2="350" y2="400" stroke="#ffffff" stroke-width="0.5" opacity="0.2"/>
    <line x1="350" y1="400" x2="200" y2="320" stroke="#ffffff" stroke-width="0.5" opacity="0.18"/>
    <line x1="200" y1="320" x2="240" y2="160" stroke="#ffffff" stroke-width="0.5" opacity="0.2"/>

    <!-- Distant connections (longer-range associations) -->
    <line x1="240" y1="160" x2="600" y2="330" stroke="#ffffff" stroke-width="0.4" opacity="0.08"/>
    <line x1="320" y1="100" x2="560" y2="170" stroke="#ffffff" stroke-width="0.4" opacity="0.08"/>
    <line x1="200" y1="320" x2="450" y2="400" stroke="#ffffff" stroke-width="0.4" opacity="0.08"/>

    <!-- Outer scattered nodes -->
    <line x1="240" y1="160" x2="120" y2="120" stroke="#00f0ff" stroke-width="0.6" opacity="0.3"/>
    <line x1="560" y1="170" x2="680" y2="120" stroke="#00f0ff" stroke-width="0.6" opacity="0.3"/>
    <line x1="200" y1="320" x2="100" y2="380" stroke="#a855f7" stroke-width="0.6" opacity="0.28"/>
    <line x1="600" y1="330" x2="700" y2="380" stroke="#a855f7" stroke-width="0.6" opacity="0.28"/>
  </g>

  <!-- Central hub node (the brain) -->
  <g>
    <circle cx="400" cy="250" r="60" fill="url(#nvGlowCenter)"/>
    <circle cx="400" cy="250" r="22" fill="url(#nvNodeActive)"/>
    <circle cx="400" cy="250" r="10" fill="#ffffff"/>
    <circle cx="400" cy="250" r="4" fill="#0a0a0a"/>
  </g>

  <!-- Primary nodes (active memories) -->
  <g>
    <circle cx="240" cy="160" r="18" fill="url(#nvNodeActive)" opacity="0.9"/>
    <circle cx="240" cy="160" r="6" fill="#00f0ff"/>

    <circle cx="560" cy="170" r="18" fill="url(#nvNodeActive)" opacity="0.85"/>
    <circle cx="560" cy="170" r="6" fill="#00f0ff"/>

    <circle cx="200" cy="320" r="16" fill="url(#nvNodePurple)" opacity="0.85"/>
    <circle cx="200" cy="320" r="5" fill="#a855f7"/>

    <circle cx="600" cy="330" r="16" fill="url(#nvNodePurple)" opacity="0.85"/>
    <circle cx="600" cy="330" r="5" fill="#a855f7"/>
  </g>

  <!-- Secondary nodes (connected memories) -->
  <g>
    <circle cx="320" cy="100" r="12" fill="#22d3ee" opacity="0.85"/>
    <circle cx="480" cy="100" r="12" fill="#22d3ee" opacity="0.85"/>
    <circle cx="350" cy="400" r="11" fill="#ec4899" opacity="0.8"/>
    <circle cx="450" cy="400" r="11" fill="#ec4899" opacity="0.8"/>
  </g>

  <!-- Outer dormant nodes (faded, far-back memories) -->
  <g opacity="0.55">
    <circle cx="120" cy="120" r="6" fill="#00f0ff"/>
    <circle cx="680" cy="120" r="6" fill="#00f0ff"/>
    <circle cx="100" cy="380" r="5" fill="#a855f7"/>
    <circle cx="700" cy="380" r="5" fill="#a855f7"/>
    <circle cx="80" cy="240" r="3" fill="#ffffff"/>
    <circle cx="720" cy="240" r="3" fill="#ffffff"/>
    <circle cx="400" cy="60" r="3" fill="#ffffff"/>
    <circle cx="400" cy="450" r="3" fill="#ffffff"/>
    <circle cx="160" cy="60" r="2.5" fill="#ffffff"/>
    <circle cx="640" cy="60" r="2.5" fill="#ffffff"/>
    <circle cx="160" cy="440" r="2.5" fill="#ffffff"/>
    <circle cx="640" cy="440" r="2.5" fill="#ffffff"/>
  </g>

  <!-- Title text overlay -->
  <text x="400" y="465" font-family="ui-monospace, monospace" font-size="11" letter-spacing="6" fill="#52525b" text-anchor="middle" opacity="0.6">
    LOCAL · FIRST · PERSISTENT · MEMORY
  </text>
</svg>
