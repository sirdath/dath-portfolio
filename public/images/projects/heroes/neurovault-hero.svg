<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <radialGradient id="nvHeroBg" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#0c0820"/>
      <stop offset="100%" stop-color="#09090b"/>
    </radialGradient>
    <radialGradient id="nvHeroGlow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nvHeroGlow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nvHeroNodeBright" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="40%" stop-color="#00f0ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nvHeroNodePurple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="40%" stop-color="#a855f7" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#nvHeroBg)"/>

  <!-- Ambient glows -->
  <ellipse cx="500" cy="350" rx="600" ry="450" fill="url(#nvHeroGlow1)"/>
  <ellipse cx="1100" cy="500" rx="500" ry="400" fill="url(#nvHeroGlow2)"/>

  <!-- Distant graph nodes (very dim - dormant memories) -->
  <g opacity="0.18">
    <circle cx="120" cy="180" r="2" fill="#ffffff"/>
    <circle cx="180" cy="280" r="1.5" fill="#ffffff"/>
    <circle cx="220" cy="120" r="2" fill="#ffffff"/>
    <circle cx="80" cy="450" r="1.5" fill="#ffffff"/>
    <circle cx="160" cy="600" r="2" fill="#ffffff"/>
    <circle cx="100" cy="720" r="1.5" fill="#ffffff"/>
    <circle cx="1480" cy="180" r="2" fill="#ffffff"/>
    <circle cx="1420" cy="280" r="1.5" fill="#ffffff"/>
    <circle cx="1380" cy="120" r="2" fill="#ffffff"/>
    <circle cx="1520" cy="450" r="1.5" fill="#ffffff"/>
    <circle cx="1440" cy="600" r="2" fill="#ffffff"/>
    <circle cx="1500" cy="720" r="1.5" fill="#ffffff"/>
    <circle cx="600" cy="80" r="1.5" fill="#ffffff"/>
    <circle cx="900" cy="60" r="2" fill="#ffffff"/>
    <circle cx="700" cy="820" r="1.5" fill="#ffffff"/>
    <circle cx="1000" cy="850" r="2" fill="#ffffff"/>
  </g>

  <!-- Subtle grid lines (like a knowledge graph background) -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="225" x2="1600" y2="225"/>
    <line x1="0" y1="450" x2="1600" y2="450"/>
    <line x1="0" y1="675" x2="1600" y2="675"/>
    <line x1="400" y1="0" x2="400" y2="900"/>
    <line x1="800" y1="0" x2="800" y2="900"/>
    <line x1="1200" y1="0" x2="1200" y2="900"/>
  </g>

  <!-- Mid-distance graph connections -->
  <g stroke="#ffffff" fill="none" opacity="0.12">
    <line x1="350" y1="280" x2="600" y2="200" stroke-width="0.5"/>
    <line x1="600" y1="200" x2="850" y2="280" stroke-width="0.5"/>
    <line x1="850" y1="280" x2="1100" y2="220" stroke-width="0.5"/>
    <line x1="450" y1="500" x2="700" y2="450" stroke-width="0.5"/>
    <line x1="700" y1="450" x2="950" y2="520" stroke-width="0.5"/>
    <line x1="950" y1="520" x2="1200" y2="480" stroke-width="0.5"/>
    <line x1="500" y1="700" x2="800" y2="650" stroke-width="0.5"/>
    <line x1="800" y1="650" x2="1080" y2="700" stroke-width="0.5"/>
  </g>

  <!-- Primary connections (cyan flow) -->
  <g stroke-linecap="round" fill="none">
    <line x1="800" y1="450" x2="600" y2="200" stroke="#00f0ff" stroke-width="1" opacity="0.5"/>
    <line x1="800" y1="450" x2="1100" y2="220" stroke="#00f0ff" stroke-width="1" opacity="0.5"/>
    <line x1="800" y1="450" x2="450" y2="500" stroke="#a855f7" stroke-width="1" opacity="0.5"/>
    <line x1="800" y1="450" x2="1200" y2="480" stroke="#a855f7" stroke-width="1" opacity="0.5"/>
    <line x1="800" y1="450" x2="500" y2="700" stroke="#22d3ee" stroke-width="1" opacity="0.45"/>
    <line x1="800" y1="450" x2="1080" y2="700" stroke="#22d3ee" stroke-width="1" opacity="0.45"/>
    <line x1="800" y1="450" x2="350" y2="280" stroke="#ec4899" stroke-width="0.8" opacity="0.4"/>
    <line x1="800" y1="450" x2="850" y2="280" stroke="#ec4899" stroke-width="0.8" opacity="0.4"/>
  </g>

  <!-- Outer scatter to graph nodes -->
  <g opacity="0.3" stroke="#ffffff" stroke-width="0.4" fill="none">
    <line x1="600" y1="200" x2="450" y2="120"/>
    <line x1="1100" y1="220" x2="1250" y2="130"/>
    <line x1="450" y1="500" x2="280" y2="540"/>
    <line x1="1200" y1="480" x2="1370" y2="520"/>
    <line x1="500" y1="700" x2="320" y2="780"/>
    <line x1="1080" y1="700" x2="1280" y2="790"/>
  </g>

  <!-- Secondary nodes (active memories) -->
  <g>
    <circle cx="600" cy="200" r="32" fill="url(#nvHeroNodeBright)"/>
    <circle cx="600" cy="200" r="9" fill="#ffffff"/>

    <circle cx="1100" cy="220" r="30" fill="url(#nvHeroNodeBright)" opacity="0.9"/>
    <circle cx="1100" cy="220" r="8" fill="#00f0ff"/>

    <circle cx="450" cy="500" r="28" fill="url(#nvHeroNodePurple)" opacity="0.9"/>
    <circle cx="450" cy="500" r="7" fill="#a855f7"/>

    <circle cx="1200" cy="480" r="28" fill="url(#nvHeroNodePurple)" opacity="0.85"/>
    <circle cx="1200" cy="480" r="7" fill="#a855f7"/>

    <circle cx="500" cy="700" r="22" fill="#22d3ee" opacity="0.7"/>
    <circle cx="500" cy="700" r="5" fill="#22d3ee"/>

    <circle cx="1080" cy="700" r="22" fill="#22d3ee" opacity="0.7"/>
    <circle cx="1080" cy="700" r="5" fill="#22d3ee"/>

    <circle cx="350" cy="280" r="14" fill="#ec4899" opacity="0.65"/>
    <circle cx="350" cy="280" r="4" fill="#ec4899"/>
    <circle cx="850" cy="280" r="14" fill="#ec4899" opacity="0.65"/>
    <circle cx="850" cy="280" r="4" fill="#ec4899"/>
  </g>

  <!-- Central hub (the brain) -->
  <g>
    <circle cx="800" cy="450" r="120" fill="url(#nvHeroNodeBright)" opacity="0.5"/>
    <circle cx="800" cy="450" r="50" fill="url(#nvHeroNodeBright)"/>
    <circle cx="800" cy="450" r="22" fill="#ffffff"/>
    <circle cx="800" cy="450" r="10" fill="#0a0a0a"/>
    <!-- Inner accent -->
    <circle cx="800" cy="450" r="65" fill="none" stroke="#00f0ff" stroke-width="1" opacity="0.4"/>
    <circle cx="800" cy="450" r="90" fill="none" stroke="#a855f7" stroke-width="0.6" opacity="0.3" stroke-dasharray="4 6"/>
  </g>

  <!-- Outer scattered far nodes -->
  <g opacity="0.65">
    <circle cx="450" cy="120" r="6" fill="#00f0ff"/>
    <circle cx="1250" cy="130" r="6" fill="#00f0ff"/>
    <circle cx="280" cy="540" r="5" fill="#a855f7"/>
    <circle cx="1370" cy="520" r="5" fill="#a855f7"/>
    <circle cx="320" cy="780" r="4" fill="#22d3ee"/>
    <circle cx="1280" cy="790" r="4" fill="#22d3ee"/>
  </g>

  <!-- Bottom annotation -->
  <g opacity="0.4">
    <line x1="600" y1="850" x2="700" y2="850" stroke="#52525b" stroke-width="0.5"/>
    <text x="800" y="855" font-family="ui-monospace, monospace" font-size="10" letter-spacing="4" fill="#52525b" text-anchor="middle">
      96% HIT@3 · 275 TOKENS / ANSWER · LOCAL-FIRST
    </text>
    <line x1="900" y1="850" x2="1000" y2="850" stroke="#52525b" stroke-width="0.5"/>
  </g>
</svg>
