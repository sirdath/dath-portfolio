<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#09090b"/>
      <stop offset="100%" stop-color="#1a0c14"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg3)"/>
  <!-- Knowledge graph / pipeline visualization -->
  <g>
    <!-- Nodes -->
    <circle cx="150" cy="250" r="30" fill="none" stroke="#ec4899" stroke-width="1.5" opacity="0.6"/>
    <text x="150" y="254" font-family="monospace" font-size="9" fill="#ec4899" text-anchor="middle" opacity="0.8">USGS</text>
    <circle cx="300" cy="150" r="30" fill="none" stroke="#a855f7" stroke-width="1.5" opacity="0.6"/>
    <text x="300" y="154" font-family="monospace" font-size="9" fill="#a855f7" text-anchor="middle" opacity="0.8">NewsAPI</text>
    <circle cx="300" cy="350" r="30" fill="none" stroke="#a855f7" stroke-width="1.5" opacity="0.6"/>
    <text x="300" y="354" font-family="monospace" font-size="9" fill="#a855f7" text-anchor="middle" opacity="0.8">Events</text>
    <rect x="420" y="220" width="80" height="60" rx="8" fill="none" stroke="#00f0ff" stroke-width="1.5" opacity="0.6"/>
    <text x="460" y="254" font-family="monospace" font-size="9" fill="#00f0ff" text-anchor="middle" opacity="0.8">LangGraph</text>
    <circle cx="600" cy="170" r="25" fill="none" stroke="#22d3ee" stroke-width="1.5" opacity="0.6"/>
    <text x="600" y="174" font-family="monospace" font-size="8" fill="#22d3ee" text-anchor="middle" opacity="0.8">SurrealDB</text>
    <circle cx="600" cy="330" r="25" fill="none" stroke="#00f0ff" stroke-width="1.5" opacity="0.6"/>
    <text x="600" y="334" font-family="monospace" font-size="8" fill="#00f0ff" text-anchor="middle" opacity="0.8">Risk Score</text>
    <!-- Edges -->
    <line x1="180" y1="240" x2="270" y2="160" stroke="#ec4899" stroke-width="1" opacity="0.3"/>
    <line x1="180" y1="260" x2="270" y2="340" stroke="#ec4899" stroke-width="1" opacity="0.3"/>
    <line x1="330" y1="155" x2="420" y2="235" stroke="#a855f7" stroke-width="1" opacity="0.3"/>
    <line x1="330" y1="345" x2="420" y2="265" stroke="#a855f7" stroke-width="1" opacity="0.3"/>
    <line x1="500" y1="235" x2="575" y2="180" stroke="#00f0ff" stroke-width="1" opacity="0.3"/>
    <line x1="500" y1="265" x2="575" y2="320" stroke="#00f0ff" stroke-width="1" opacity="0.3"/>
  </g>
  <!-- Title -->
  <text x="400" y="440" font-family="monospace" font-size="14" fill="#ec4899" text-anchor="middle" opacity="0.6">6-Node LangGraph Pipeline</text>
  <text x="400" y="465" font-family="monospace" font-size="11" fill="#a1a1aa" text-anchor="middle" opacity="0.4">154 companies | Graph traversal | &lt;8s scoring</text>
</svg>
