<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#09090b"/>
      <stop offset="100%" stop-color="#0c1222"/>
    </linearGradient>
    <linearGradient id="hex" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Hex grid pattern -->
  <g opacity="0.4">
    <polygon points="200,80 230,65 260,80 260,110 230,125 200,110" fill="none" stroke="#00f0ff" stroke-width="1" opacity="0.6"/>
    <polygon points="260,80 290,65 320,80 320,110 290,125 260,110" fill="url(#hex)" stroke="#00f0ff" stroke-width="1"/>
    <polygon points="320,80 350,65 380,80 380,110 350,125 320,110" fill="none" stroke="#00f0ff" stroke-width="1" opacity="0.4"/>
    <polygon points="230,125 260,110 290,125 290,155 260,170 230,155" fill="url(#hex)" stroke="#00f0ff" stroke-width="1"/>
    <polygon points="290,125 320,110 350,125 350,155 320,170 290,155" fill="none" stroke="#00f0ff" stroke-width="1" opacity="0.5"/>
    <polygon points="350,125 380,110 410,125 410,155 380,170 350,155" fill="url(#hex)" stroke="#00f0ff" stroke-width="1" opacity="0.3"/>
    <polygon points="260,170 290,155 320,170 320,200 290,215 260,200" fill="none" stroke="#00f0ff" stroke-width="1" opacity="0.6"/>
    <polygon points="320,170 350,155 380,170 380,200 350,215 320,200" fill="url(#hex)" stroke="#00f0ff" stroke-width="1" opacity="0.4"/>
  </g>
  <!-- Network nodes -->
  <g>
    <circle cx="450" cy="180" r="4" fill="#00f0ff" opacity="0.8"/>
    <circle cx="520" cy="220" r="3" fill="#00f0ff" opacity="0.6"/>
    <circle cx="580" cy="160" r="5" fill="#a855f7" opacity="0.7"/>
    <circle cx="620" cy="250" r="3" fill="#00f0ff" opacity="0.5"/>
    <circle cx="500" cy="300" r="4" fill="#a855f7" opacity="0.6"/>
    <circle cx="550" cy="280" r="3" fill="#00f0ff" opacity="0.7"/>
    <line x1="450" y1="180" x2="520" y2="220" stroke="#00f0ff" stroke-width="0.5" opacity="0.3"/>
    <line x1="520" y1="220" x2="580" y2="160" stroke="#00f0ff" stroke-width="0.5" opacity="0.3"/>
    <line x1="580" y1="160" x2="620" y2="250" stroke="#a855f7" stroke-width="0.5" opacity="0.3"/>
    <line x1="500" y1="300" x2="550" y2="280" stroke="#a855f7" stroke-width="0.5" opacity="0.3"/>
    <line x1="550" y1="280" x2="520" y2="220" stroke="#00f0ff" stroke-width="0.5" opacity="0.3"/>
  </g>
  <!-- Title -->
  <text x="400" y="380" font-family="monospace" font-size="14" fill="#00f0ff" text-anchor="middle" opacity="0.6">H3 Hexagonal Grid Analysis</text>
  <text x="400" y="410" font-family="monospace" font-size="11" fill="#a1a1aa" text-anchor="middle" opacity="0.4">55,000 hexagons | XGBoost | NetworkX</text>
</svg>
