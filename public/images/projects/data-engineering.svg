<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#09090b"/>
      <stop offset="100%" stop-color="#0c1618"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg4)"/>
  <!-- Star schema visualization -->
  <!-- Fact table (center) -->
  <rect x="330" y="190" width="140" height="80" rx="8" fill="none" stroke="#00f0ff" stroke-width="2" opacity="0.6"/>
  <text x="400" y="225" font-family="monospace" font-size="10" fill="#00f0ff" text-anchor="middle" opacity="0.8">FACT TABLE</text>
  <text x="400" y="245" font-family="monospace" font-size="8" fill="#a1a1aa" text-anchor="middle" opacity="0.5">Lakehouse</text>
  <!-- Dimension tables -->
  <rect x="120" y="100" width="110" height="50" rx="6" fill="none" stroke="#a855f7" stroke-width="1" opacity="0.5"/>
  <text x="175" y="130" font-family="monospace" font-size="9" fill="#a855f7" text-anchor="middle" opacity="0.7">dim_geography</text>
  <rect x="120" y="310" width="110" height="50" rx="6" fill="none" stroke="#a855f7" stroke-width="1" opacity="0.5"/>
  <text x="175" y="340" font-family="monospace" font-size="9" fill="#a855f7" text-anchor="middle" opacity="0.7">dim_time</text>
  <rect x="570" y="100" width="110" height="50" rx="6" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.5"/>
  <text x="625" y="130" font-family="monospace" font-size="9" fill="#22d3ee" text-anchor="middle" opacity="0.7">dim_source</text>
  <rect x="570" y="310" width="110" height="50" rx="6" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.5"/>
  <text x="625" y="340" font-family="monospace" font-size="9" fill="#22d3ee" text-anchor="middle" opacity="0.7">dim_metric</text>
  <!-- Connections -->
  <line x1="230" y1="125" x2="330" y2="210" stroke="#a855f7" stroke-width="1" opacity="0.3"/>
  <line x1="230" y1="335" x2="330" y2="250" stroke="#a855f7" stroke-width="1" opacity="0.3"/>
  <line x1="570" y1="125" x2="470" y2="210" stroke="#22d3ee" stroke-width="1" opacity="0.3"/>
  <line x1="570" y1="335" x2="470" y2="250" stroke="#22d3ee" stroke-width="1" opacity="0.3"/>
  <!-- Data flow arrows -->
  <g opacity="0.3">
    <rect x="345" y="80" width="6" height="6" fill="#00f0ff" rx="1"/>
    <rect x="365" y="70" width="4" height="4" fill="#a855f7" rx="1"/>
    <rect x="420" y="75" width="5" height="5" fill="#22d3ee" rx="1"/>
    <rect x="385" y="85" width="3" height="3" fill="#00f0ff" rx="1"/>
  </g>
  <!-- Title -->
  <text x="400" y="420" font-family="monospace" font-size="14" fill="#22d3ee" text-anchor="middle" opacity="0.6">Star Schema Lakehouse</text>
  <text x="400" y="445" font-family="monospace" font-size="11" fill="#a1a1aa" text-anchor="middle" opacity="0.4">PySpark | MongoDB | DuckDB | Parquet</text>
</svg>
